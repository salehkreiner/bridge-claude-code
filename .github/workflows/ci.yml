name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
          # Zero third-party dependencies — there is nothing to cache.
          cache: false

      - name: gofmt (must be clean)
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # The committed Windows resource object is a binary blob. Prove it is exactly
      # what the manifest + generator produce, so nothing can hide inside it. Runs
      # once (on Linux) since the .syso is identical on every host.
      - name: verify embedded manifest is reproducible
        if: runner.os == 'Linux'
        shell: bash
        run: |
          go generate ./...
          if ! git diff --exit-code -- cmd/scrub-setup/rsrc_windows_amd64.syso; then
            echo "rsrc_windows_amd64.syso is out of date — run 'go generate ./...' and commit the result."
            exit 1
          fi

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

      # The race detector needs a C toolchain; ubuntu/macos runners have one,
      # which also keeps our CGO_ENABLED=0 promise intact on Windows.
      - name: test (race)
        if: runner.os != 'Windows'
        run: go test -race ./...
